<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Cleaner</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h1>Tab Cleaner</h1>
    <p class="subtitle">Groups tabs by domain, closes duplicates.</p>

    <div class="stats" id="stats"></div>

    <div class="actions">
      <button id="btn-clean">Clean &amp; Group Tabs</button>
      <button id="btn-dupes" class="secondary">Remove Duplicates Only</button>
    </div>

    <div class="result" id="result"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
